---
- name: mongodb configuration
  hosts: mongodb
  become: true
  tasks: 
  - name: install mongodb server
    ansible.builtin.dnf:
       name: mongodb-org
       state: present

  - name: start & enable mongod
    ansible.builtin.service:
       name: mongod
       state: started
       enabled: yes 

  - name: Allow remote connections
    ansible.builtin.replace:
       path: /etc/mongod.conf
       regexp: '127.0.0.1'
       replace: '0.0.0.0'

  - name: restart mongodb
    ansible.builtin.service:
         name: mongod
         state: restarted
         


  